name: Build template

# Called by check-upstream.yml for auto-triggered builds, or run manually.
on:
  workflow_call:
    inputs:
      recipe:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      recipe:
        required: true
        type: string
        description: "Recipe name (e.g. debian-12)"

jobs:
  build:
    runs-on: ubuntu-latest
    # Serialize all build runs. The PVE node has shared state that doesn't
    # tolerate parallel access: the cofoundry-out / cofoundry-work dirs,
    # the 9100-9299 builder/scratch VMID pool, and registry.json on main.
    concurrency:
      group: cofoundry-build
      cancel-in-progress: false
    permissions:
      contents: write
    # Job-level env so every step inherits. Sensitive values come from
    # secrets; resource names and network coords come from repo variables
    # (visible in the UI, reviewable). `vars.X || secrets.X` keeps
    # back-compat for anyone who originally set them as secrets.
    env:
      # ── credentials (secrets only) ──
      PVE_TOKEN_SECRET: ${{ secrets.PVE_TOKEN_SECRET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      # ── Proxmox resource names / network coords (vars, with secret fallback) ──
      PVE_HOST: ${{ vars.PVE_HOST || secrets.PVE_HOST }}
      PVE_PORT: ${{ vars.PVE_PORT || secrets.PVE_PORT }}
      PVE_NODE: ${{ vars.PVE_NODE || secrets.PVE_NODE }}
      PVE_TOKEN_ID: ${{ vars.PVE_TOKEN_ID || secrets.PVE_TOKEN_ID }}
      SSH_TARGET: ${{ vars.SSH_TARGET || secrets.SSH_TARGET }}
      PVE_DUMP_DIR: ${{ vars.PVE_DUMP_DIR || secrets.PVE_DUMP_DIR }}
      CF_STORAGE: ${{ vars.CF_STORAGE || secrets.CF_STORAGE }}
      CF_ISO_STORAGE: ${{ vars.CF_ISO_STORAGE || secrets.CF_ISO_STORAGE }}
      CF_BRIDGE: ${{ vars.CF_BRIDGE || secrets.CF_BRIDGE }}
      # ── R2 endpoint + bucket (vars, with secret fallback) ──
      R2_ENDPOINT: ${{ vars.R2_ENDPOINT || secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      # ── Tailscale ──────────────────────────────────────────────────────────
      # Set TS_TAG (repo variable) to whatever tag your OAuth client is scoped
      # to and your ACL grants SSH from. Default: tag:ci.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ vars.TS_TAG || 'tag:ci' }}

      # ── SSH config (always) ───────────────────────────────────────────────
      # Disable strict host-key checking so first-contact SSH (whether
      # authenticated by a key or by Tailscale SSH) doesn't fail on the
      # missing known_hosts entry.
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking=no" >> ~/.ssh/config

      # ── SSH key (optional; skipped when using Tailscale SSH) ──────────────
      - name: Set up SSH key
        if: env.SSH_PRIVATE_KEY != ''
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      # ── Build template ─────────────────────────────────────────────────────
      # inject-placeholders.sh generates an ephemeral SSH key (Linux) or
      # WinRM password (Windows), patches recipe files, and writes a vars file.
      # packer init + packer build are invoked by `cf build`.
      #
      # CF_UPLOAD_CMD pushes the artifact to R2 at a content-addressed path,
      # so each build is immutable and rollback is "revert registry.json".
      - name: Build template
        run: bun run cf build ${{ inputs.recipe }} --ci --verbose
        env:
          # Artifacts upload directly to R2 from the PVE node; never sync the
          # multi-GB .vma.zst back to the runner.
          CF_SKIP_SYNC_BACK: '1'
          # Override the upload commands via repo variables (Settings →
          # Variables → Actions): CF_UPLOAD_CMD, CF_SIDECAR_UPLOAD_CMD. Unset →
          # content-addressed defaults under templates/<name>-<arch>/<sha256>.
          # CF_PUBLIC_URL_TMPL is required (no default) — set it as a repo var.
          # Placeholders: {{file}} {{name}} {{arch}} {{sha256}} {{group}} {{filename}}.
          CF_UPLOAD_CMD: ${{ vars.CF_UPLOAD_CMD || format('aws --endpoint-url {0} s3 cp {1} s3://{2}/templates/{3}-{4}/{5}.vma.zst', secrets.R2_ENDPOINT, '{{file}}', secrets.R2_BUCKET, '{{name}}', '{{arch}}', '{{sha256}}') }}
          CF_SIDECAR_UPLOAD_CMD: ${{ vars.CF_SIDECAR_UPLOAD_CMD || format('aws --endpoint-url {0} s3 cp {1} s3://{2}/templates/{3}-{4}/{5}.json', secrets.R2_ENDPOINT, '{{file}}', secrets.R2_BUCKET, '{{name}}', '{{arch}}', '{{sha256}}') }}
          CF_PUBLIC_URL_TMPL: ${{ vars.CF_PUBLIC_URL_TMPL }}

      # ── Smoke-test artifact ────────────────────────────────────────────────
      # Restores the just-built archive to a scratch VMID on the PVE node,
      # boots it, waits for the guest agent, then destroys it. Catches corrupt
      # vzdump output, broken cloud-init, kernel panics, missing guest agent
      # before `cf publish` makes the build consumer-visible.
      - name: Smoke-test artifact
        run: bun run cf verify ${{ inputs.recipe }}

      # ── Publish manifest ───────────────────────────────────────────────────
      # --r2: sidecars live in R2 (uploaded by CF_SIDECAR_UPLOAD_CMD during the
      # build step); the runner doesn't sync artifacts back, so reading from R2
      # is the only way the registry reflects all templates, not just this build.
      - name: Publish manifest
        run: bun run cf publish --r2

      # ── Commit registry.json back to main ─────────────────────────────────
      # Canonical history: `git log registry.json` is the audit log of every
      # published version. Rollback = revert the commit.
      - name: Commit registry.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: registry.json
          commit_message: "chore: publish ${{ inputs.recipe }} build"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

      # ── Mirror registry.json to R2 ─────────────────────────────────────────
      # Single fetch origin for consumers. Short TTL so rollbacks propagate
      # quickly.
      - name: Mirror registry.json to R2
        run: |
          aws --endpoint-url "$R2_ENDPOINT" s3 cp \
            registry.json "s3://$R2_BUCKET/registry.json" \
            --cache-control "public, max-age=60" \
            --content-type "application/json"

      # ── Reclaim disk on the node ──────────────────────────────────────────
      # Folds the old weekly cleanup cron into the build pipeline.
      - name: Prune Proxmox node
        if: always()
        run: bun run cf prune --days 7

      # ── Prune old R2 objects ──────────────────────────────────────────────
      # Keep last 5 per template. The R2 lifecycle rule (configured out-of-band)
      # provides a broader 60-day safety net for orphaned recipes.
      - name: Prune R2 templates
        if: always()
        run: bun run cf prune --r2 --keep 5

      # ── Upload artifact ────────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.recipe }}
          path: |
            registry.json
            dist/
          retention-days: 30
