name: Check upstream images

on:
  schedule:
    - cron: "0 6 * * 1" # weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      any_changed: ${{ steps.check.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - id: check
        run: |
          CHANGED=$(bun run cf check --json)
          echo "matrix={\"recipe\":$CHANGED}" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED" = "[]" ]; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated checksums
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add upstream-checksums.json
          git diff --staged --quiet || (git commit -m "chore: update upstream checksums" && git push)

  build:
    needs: check
    if: needs.check.outputs.any_changed == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check.outputs.matrix) }}
    uses: ./.github/workflows/build.yml
    with:
      recipe: ${{ matrix.recipe }}
    secrets: inherit
