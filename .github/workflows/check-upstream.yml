name: Check upstream images

on:
  schedule:
    - cron: "0 6 * * 1" # weekly on Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild all recipes regardless of upstream changes"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      any_changed: ${{ steps.check.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - id: check
        env:
          FORCE: ${{ inputs.force }}
        run: |
          if [ "$FORCE" = "true" ]; then
            CHANGED=$(ls recipes/*.pkr.hcl | xargs -n1 basename | sed 's/\.pkr\.hcl$//' | jq -R . | jq -sc .)
          else
            CHANGED=$(bun run cf check --json)
          fi
          echo "matrix={\"recipe\":$CHANGED}" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED" = "[]" ]; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Do not commit this yet. If any build fails, leaving the old checksums on
      # main makes the next scheduled run detect and retry the same update.
      - uses: actions/upload-artifact@v7
        with:
          name: upstream-checksums
          path: upstream-checksums.json
          retention-days: 1

  build:
    needs: check
    if: needs.check.outputs.any_changed == 'true'
    strategy:
      fail-fast: false
      # Node-wide leases enforce RAM/CPU limits across these independent jobs.
      # This cap limits runner fan-out and can be overridden without weakening
      # node safety.
      max-parallel: ${{ fromJSON(vars.CF_CI_MAX_PARALLEL || '4') }}
      matrix: ${{ fromJson(needs.check.outputs.matrix) }}
    uses: ./.github/workflows/build-one.yml
    with:
      recipe: ${{ matrix.recipe }}
    secrets: inherit

  publish:
    needs: build
    if: needs.build.result == 'success'
    uses: ./.github/workflows/publish.yml
    secrets: inherit

  prune-node:
    needs: [check, build]
    if: always() && needs.check.result == 'success'
    uses: ./.github/workflows/prune-node.yml
    secrets: inherit

  commit-checksums:
    needs: [check, build, publish]
    if: >-
      always() &&
      needs.check.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    runs-on: ubuntu-latest
    # Serialize every generated-file writer. The retry below also tolerates an
    # unrelated human push landing between fetch and push.
    concurrency:
      group: cofoundry-publish
      cancel-in-progress: false
    env:
      # 'true' only when a registry-writer GitHub App is configured. When empty
      # (no ruleset on main), fall back to the default GITHUB_TOKEN for the
      # upstream-checksums push. See docs/setup.md#3.
      HAS_REGISTRY_APP: ${{ secrets.REGISTRY_APP_ID != '' && secrets.REGISTRY_APP_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: registry-app-token
        if: env.HAS_REGISTRY_APP == 'true'
        with:
          app-id: ${{ secrets.REGISTRY_APP_ID }}
          private-key: ${{ secrets.REGISTRY_APP_PRIVATE_KEY }}

      # Checkout persists whichever token it's given, so the push below uses it:
      # the app token when configured, otherwise the default GITHUB_TOKEN.
      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ steps.registry-app-token.outputs.token || github.token }}

      - uses: actions/download-artifact@v8
        with:
          name: upstream-checksums
          path: .

      - name: Commit updated checksums
        run: |
          git config user.name "cofoundry-registry-writer[bot]"
          git config user.email "cofoundry-registry-writer[bot]@users.noreply.github.com"
          cp upstream-checksums.json "$RUNNER_TEMP/upstream-checksums.json"
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            cp "$RUNNER_TEMP/upstream-checksums.json" upstream-checksums.json
            git add upstream-checksums.json
            if git diff --cached --quiet; then
              break
            fi
            git commit -m "chore: update upstream checksums"
            if git push origin HEAD:main; then
              break
            fi
            if [ "$attempt" = 3 ]; then
              echo "checksum push failed after 3 attempts" >&2
              exit 1
            fi
          done
