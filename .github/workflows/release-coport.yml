name: Release coport

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate semver tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' is not semver. Expected v1.2.3, 1.2.3, v1.2.3-rc.1, etc."
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install coport dependencies
        run: bun install --frozen-lockfile
        working-directory: coport

      - name: Typecheck
        run: bun run typecheck
        working-directory: coport

      - name: Build Linux binaries
        run: |
          mkdir -p ../release
          bun build --compile --target=bun-linux-x64 --outfile ../release/coport-linux-x64 src/main.ts
          bun build --compile --target=bun-linux-arm64 --outfile ../release/coport-linux-arm64 src/main.ts
        working-directory: coport

      - name: Package artifacts
        run: |
          sha256sum release/coport-linux-x64 release/coport-linux-arm64 > release/coport.sha256

      - name: Extract release notes
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk -v tag="$TAG" '
            $0 ~ "^##[[:space:]]+v?" tag "([[:space:]]|$)" { found = 1; next }
            found && /^##[[:space:]]+/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - uses: actions/upload-artifact@v4
        with:
          name: coport-linux
          path: release/
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            release/coport-linux-x64
            release/coport-linux-arm64
            release/coport.sha256
