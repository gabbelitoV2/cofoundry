name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test
      # Scoped to the TS sources kept prettier-clean; docs, JSON metadata, and
      # packages/ui predate the check and are not formatted yet.
      - run: bunx prettier --check src tests coport/src
      - run: bun run typecheck
      - run: bun run --cwd coport typecheck
