#_preseed_V1
d-i debian-installer/language string en
d-i debian-installer/country string US
d-i debian-installer/locale string en_US.UTF-8
d-i localechooser/supported-locales multiselect en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i console-keymaps-at/keymap select en-latin9
d-i debian-installer/keymap string en-latin9
d-i netcfg/get_hostname string packer-__PACKER_RECIPE_NAME__
d-i netcfg/wireless_wep string
d-i hw-detect/load_firmware boolean false
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string packer
d-i passwd/username string packer
d-i passwd/user-password-crypted password !
d-i clock-setup/utc boolean true
d-i time/zone string Etc/UTC
d-i clock-setup/ntp boolean true
d-i partman-auto/disk string /dev/sda
d-i partman-auto/method string regular
# One primary ext4 root filling the disk: the layout every mainstream cloud
# image ships (Debian genericcloud, Ubuntu cloud, Alma/Rocky GenericCloud), and
# the same shape as this repo's kickstart `part / --grow` and Ubuntu's
# `layout: direct`.
#
# The previous `lvm` + `multi` layout could never grow. It put the LVM PV in a
# logical partition inside an extended partition, which growpart cannot extend,
# and LVM would then still need pvresize + lvextend, which cloud-init does not
# do. A clone on a 500G disk kept a 3.6G root.
#
# `-1` as the maximum is what fills the disk. Deliberately no swap partition:
# growpart only extends the LAST partition, so a trailing swap would re-break
# growth for a completely different reason. Same reason ubuntu sets
# `swap: size: 0`. Without LVM, /boot lives on root, matching cloud images.
d-i partman-auto/expert_recipe string                              \
      cofoundry ::                                                 \
              1024 1 -1 ext4                                       \
                      $primary{ } $bootable{ }                     \
                      method{ format } format{ }                   \
                      use_filesystem{ } filesystem{ ext4 }         \
                      mountpoint{ / }                              \
              .
d-i partman-auto/choose_recipe select cofoundry
# Suppress the "you have not selected any partitions for use as swap" prompt,
# which would otherwise hang the unattended install.
d-i partman-basicfilesystems/no_swap boolean false
# Cheap insurance if the build disk ever is not pristine.
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-md/confirm boolean true
d-i partman/mount_style select uuid
d-i base-installer/install-recommends boolean false
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/use_mirror boolean true
d-i apt-setup/security_host string security.debian.org
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string qemu-guest-agent sudo ca-certificates cloud-init cloud-initramfs-growroot openssh-server
d-i pkgsel/upgrade select safe-upgrade
popularity-contest popularity-contest/participate boolean false
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string /dev/sda
d-i preseed/late_command string \
  in-target mkdir -p /home/packer/.ssh; \
  echo '__PACKER_SSH_PUBLIC_KEY__' > /target/home/packer/.ssh/authorized_keys; \
  in-target chown -R packer:packer /home/packer/.ssh; \
  in-target chmod 700 /home/packer/.ssh; \
  in-target chmod 600 /home/packer/.ssh/authorized_keys; \
  in-target usermod -aG sudo packer; \
  echo 'packer ALL=(ALL) NOPASSWD:ALL' > /target/etc/sudoers.d/packer; \
  in-target sed -i 's|^GRUB_CMDLINE_LINUX=.*|GRUB_CMDLINE_LINUX="console=tty0 console=ttyS0,115200"|' /etc/default/grub; \
  in-target update-grub; \
  in-target mkdir -p /etc/ssh/sshd_config.d; \
  printf 'PermitRootLogin yes\nPasswordAuthentication yes\n' > /target/etc/ssh/sshd_config.d/10-cofoundry.conf; \
  chmod 440 /target/etc/sudoers.d/packer
d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean true
